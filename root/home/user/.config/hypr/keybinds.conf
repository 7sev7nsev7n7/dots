# Configurations
binds {
  workspace_back_and_forth = true
  focus_preferred_method = 1
  allow_pin_fullscreen = true
}

# Disable all binds
bind = super, escape, exec, hyprctl dispatch submap disable; dunstify -a "$HOSTNAME" "Disabled keybinds"
submap = disable
bind = super, escape, exec, hyprctl dispatch submap reset; dunstify -a "$HOSTNAME" "Enabled keybinds"
submap = reset

# General

# Open wofi
bindr = supershift, super_l, exec, if [ "$(ps -e | grep -o wofi)" == "" ]; then prime-run wofi -p "[GPU]> "; else pkill wofi; fi
bindr = super, super_l, exec, if [ "$(ps -e | grep -o wofi)" == "" ]; then wofi -p ">"; else pkill wofi; fi

# Open kitty
bind = super, semicolon, exec, kitty

# Copyq
bind = super, q, exec, copyq toggle

# Kill window
bind = super, x, killactive

# Force kill window
bind = supershift, x, forcekillactive

# Exit
bind = supershift, escape, exec, pkill xrdb
bind = supershift, escape, exit 

# Theme
bind = super, w, exec, [float; move 650 270; size 800 600] ~/.scripts/colors/cwallchoose.sh ~/media/pictures/wallpapers

# Keyboard Lighting
bind = supershift, left, exec, ~/.scripts/colors/keyboard.sh -1
bind = , code:248, exec, ~/.scripts/colors/keyboard.sh -1
bind = supershift, right, exec, ~/.scripts/colors/keyboard.sh 1
bind = , code:211, exec, ~/.scripts/colors/keyboard.sh 1

# flameshot
bind = , print, exec, flameshot full -c
bind = shift, print, exec, flameshot gui
bind = ctrl, print, exec, ~/.scripts/hypr/windowshot.sh
bind = shiftctrl, print, exec, ~/.scripts/hypr/windowshot.sh gui

bind = super, prior, exec, flameshot full -c
bind = supershift, prior, exec, flameshot gui
bind = superctrl, prior, exec, ~/.scripts/hypr/windowshot.sh
bind = supershiftctrl, prior, exec, ~/.scripts/hypr/windowshot.sh gui

# Hyprlock
bind = superctrlshift, l, exec, hyprlock

# Waybar
bind = super, b, exec, pkill -SIGUSR1 waybar
bind = supershift, b, exec, pkill waybar; waybar

# Hyprpicker
bind = super, c, exec, hyprctl keyword input:sensitivity -1; hyprpicker -a; hyprctl keyword input:sensitivity 0

# Backlight
bindle = super, f7, exec, backlight_control -5
bindle = super, f8, exec, backlight_control +5
bindle = supershift, f7, exec, backlight_control 0
bindle = supershift, f8, exec, backlight_control 100

# Audio
bindle = super, f1, exec, pamixer -t # hardware keyboard
bindle = super, f2, exec, pamixer -d 5 # hardware keyboard
bindle = super, f3, exec, pamixer -i 5 # hardware keyboard
bindle = supershift, f1, exec, playerctl previous
bindle = supershift, f2, exec, playerctl play-pause
bindle = supershift, f3, exec, playerctl next

# Toggle touchpad
bind = super, f10, exec, file=~/.config/hypr/touchpad.conf; if [[ $(sed -nE 's/enabled = (.)/\1/p' $file) -eq 0 ]]; then en=1; msg="Enabled"; else en=0; msg="Disabled"; fi; sed -Ei "s/enabled = ./enabled = $en/" $file; dunstify -a "$HOSTNAME" "$msg touchpad"

# Dunst
bindn = , escape, exec, dunstctl close-all; 
bind = supershift, n, exec, dunstctl close-all; dunstctl history-clear
bind = super, n, exec, dunstctl history-pop
bind = superctrl, n, exec, dunstctl set-paused toggle; if [ "$(dunstctl is-paused)" == "false" ]; then dunstify -a $HOSTNAME "Notifications" "Resumed notifications"; fi 

# Switch keyboard layout
bindl = super, space, exec, hyprctl switchxkblayout all next
bindl = supershift, space, exec, hyprctl switchxkblayout all prev

# Focusing windows
binde = super, h, layoutmsg, focus l
binde = super, l, layoutmsg, focus r
binde = super, j, workspace, e+1
binde = super, k, workspace, e-1

# Moving windows
bind = supershift, h, layoutmsg, swapcol l
bind = supershift, l, layoutmsg, swapcol r
bind = supershift, j, movetoworkspace, +1
bind = supershift, k, movetoworkspace, -1

# Resizing windows
binde = superctrl, h, resizeactive, -50 0
binde = superctrl, l, resizeactive, 50 0
binde = superctrl, j, resizeactive, 0 50
binde = superctrl, k, resizeactive, 0 -50

# Fullscreen
bind = super, f, fullscreen
bind = super, m, fullscreen, 1
bind = supershift, f, fullscreenstate, 0 3

# Switch workspaces with mainMod + [0-9]
bind = super, 1, workspace, 1
bind = super, 2, workspace, 2
bind = super, 3, workspace, 3
bind = super, 4, workspace, 4
bind = super, 5, workspace, 5
bind = super, 6, workspace, 6
bind = super, 7, workspace, 7
bind = super, 8, workspace, 8
bind = super, 9, workspace, 9
bind = super, 0, workspace, 10
bind = super, a, togglespecialworkspace, pavucontrol

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = supershift, 1, movetoworkspace, 1
bind = supershift, 2, movetoworkspace, 2
bind = supershift, 3, movetoworkspace, 3
bind = supershift, 4, movetoworkspace, 4
bind = supershift, 5, movetoworkspace, 5
bind = supershift, 6, movetoworkspace, 6
bind = supershift, 7, movetoworkspace, 7
bind = supershift, 8, movetoworkspace, 8
bind = supershift, 9, movetoworkspace, 9
bind = supershift, 0, movetoworkspace, 10

# Monitor controls
bind = super, tab, focusmonitor, +1
bind = supershift, tab, movecurrentworkspacetomonitor, +1

# Rotate monitor display
bind = superctrl, down, exec, hyprctl keyword 'monitorv2[eDP-1]:transform' 0
bind = superctrl, right, exec, hyprctl keyword 'monitorv2[eDP-1]:transform' 1
bind = superctrl, up, exec, hyprctl keyword 'monitorv2[eDP-1]:transform' 2
bind = superctrl, left, exec, hyprctl keyword 'monitorv2[eDP-1]:transform' 3

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = super, mouse:272, movewindow
bindm = super, mouse:273, resizewindow
